<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이트 준비중</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #161923;
    --text: #f5f5f7;
    --sub: #9a9ba5;
    --accent: #e94057;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
  }
  body {
    background: radial-gradient(circle at 50% 20%, #1a1e2a 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  .logo {
    max-width: 220px;
    width: 60%;
    height: auto;
    margin-bottom: 40px;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.4));
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  p.message {
    font-size: 16px;
    color: var(--sub);
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: 1px solid rgba(233, 64, 87, 0.4);
    border-radius: 999px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  footer {
    margin-top: 48px;
    font-size: 12px;
    color: #55565f;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://tjd180.cafe24.com/web/upload/category/editor/2026/04/21/591949be5f754f4bc30c3196fd750deb.png" alt="로고">
    <h1>사이트 준비중입니다</h1>
    <p class="message">더 나은 모습으로 찾아뵙기 위해 준비하고 있습니다.<br>빠른 시일 내에 오픈하겠습니다.</p>
    <span class="badge"><span class="dot"></span>Coming Soon</span>
    <footer>&copy; 2026 All rights reserved.</footer>
  </div>
</body>
</html>
